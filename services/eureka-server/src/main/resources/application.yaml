spring:
  application:
    name: eureka-server

server:
  port: 8761


eureka:
  instance:
    hostname: eureka-server
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  server:
    enable-self-preservation: false # Dev mode

management:
  endpoints:
    web:
      exposure:
        include: health,info  # ✅ FIX: Specific endpoints
  endpoint:
    health:
      show-details: always